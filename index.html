<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt 智能寶庫</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body {
            background-color: #fdfbf7; /* 柔和的米白色底 */
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        }
        /* 自定義卡片內容捲軸 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #e5e7eb;
            border-radius: 20px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background-color: #d1d5db;
        }
        /* 隱藏捲軸但可滾動的分類列 (手機版用) */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="min-h-screen pb-12">

    <!-- 頂部區塊 -->
    <header class="pt-12 pb-8 px-4 text-center">
        <h1 class="text-3xl md:text-4xl font-bold text-gray-700 mb-3 flex items-center justify-center gap-3">
            <span>🚀</span> AI Prompt 智能寶庫
        </h1>
        <a href="https://docs.google.com/spreadsheets/d/1GNAyE5fNZ4pU8MDxxADHvwWVKqEpxPGZ1iqyeMHKn2U/edit?gid=2013526827#gid=2013526827" 
           target="_blank" rel="noopener noreferrer"
           class="inline-flex items-center gap-2 text-rose-400 hover:text-rose-500 bg-rose-50 hover:bg-rose-100 px-4 py-1.5 rounded-full text-sm transition-colors mb-8">
            <i data-lucide="folder-open" class="w-4 h-4"></i>
            開啟原始資料 Google Sheet
        </a>

        <!-- 搜尋列 -->
        <div class="max-w-2xl mx-auto relative mb-8 px-4">
            <div class="absolute inset-y-0 left-8 flex items-center pointer-events-none text-rose-300">
                <i data-lucide="search" class="w-5 h-5"></i>
            </div>
            <input type="text" id="searchInput" placeholder="搜尋提示詞..." 
                   class="w-full pl-12 pr-6 py-3.5 rounded-full border border-rose-100 shadow-sm focus:outline-none focus:ring-4 focus:ring-[#FFB7B2]/30 focus:border-[#FFB7B2] text-gray-700 transition-all text-base bg-white/80">
        </div>

        <!-- 分類標籤 -->
        <div class="max-w-5xl mx-auto px-4 overflow-x-auto hide-scrollbar">
            <div id="categories" class="flex flex-wrap justify-center gap-2.5 min-w-max md:min-w-0">
                <!-- 標籤會由 JavaScript 動態生成 -->
            </div>
        </div>
    </header>

    <!-- 內容區塊 -->
    <main class="max-w-7xl mx-auto px-4 md:px-6 lg:px-8">
        <div class="flex items-center gap-2 mb-6 ml-2">
            <span class="text-2xl">🧠</span>
            <h2 class="text-xl font-bold text-gray-700">AI 協思</h2>
        </div>

        <!-- 載入中提示 -->
        <div id="loading" class="text-center py-20">
            <i data-lucide="loader-2" class="w-10 h-10 animate-spin text-rose-300 mx-auto mb-4"></i>
            <p class="text-gray-500 font-medium">正在從 Google Sheet 讀取資料中...</p>
        </div>

        <!-- 提示詞卡片網格 -->
        <div id="cards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 hidden">
            <!-- 卡片會由 JavaScript 動態生成 -->
        </div>
    </main>

    <script>
        // 初始化 Lucide Icons
        lucide.createIcons();

        // 狀態管理
        let allData = [];
        let activeCategory = '全部';
        let searchTerm = '';

        // DOM 元素
        const categoriesContainer = document.getElementById('categories');
        const cardsContainer = document.getElementById('cards');
        const searchInput = document.getElementById('searchInput');
        const loadingSpinner = document.getElementById('loading');

        // Google Sheet 網址處理 (使用 Google Visualization API，原生支援 CORS)
        const sheetId = '1GNAyE5fNZ4pU8MDxxADHvwWVKqEpxPGZ1iqyeMHKn2U';
        const gid = '2013526827';
        const jsonUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}`;

        // 初始化：獲取資料
        fetchData();

        async function fetchData() {
            try {
                const response = await fetch(jsonUrl);
                if (!response.ok) throw new Error('Network error');
                
                const text = await response.text();
                
                // 擷取 JSON 物件
                const jsonString = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                const data = JSON.parse(jsonString);

                // 解析標題 (cols) 與資料列 (rows)
                let headers = data.table.cols.map(col => col.label || '');
                let rows = data.table.rows.map(row => {
                    if (!row || !row.c) return [];
                    return row.c.map(cell => {
                        if (!cell) return '';
                        return (cell.f !== undefined && cell.f !== null) ? String(cell.f) : 
                               (cell.v !== undefined && cell.v !== null) ? String(cell.v) : '';
                    });
                });

                // 智慧判斷: 如果 API 沒抓到標題，手動從第一列抓取
                if (headers.every(h => h === '') && rows.length > 0) {
                    const firstRowStr = rows[0].join('').toLowerCase();
                    const keywords = ['分類', '類別', '標題', '名稱', '主題', '內容', '提示詞', '指令', 'category', 'title', 'prompt'];
                    const seemsLikeHeader = keywords.some(kw => firstRowStr.includes(kw));
                    
                    if (seemsLikeHeader) {
                        headers = rows.shift(); // 抽出第一列作為標題
                    }
                }

                processData(headers, rows);

            } catch (err) {
                console.error("載入資料失敗:", err);
                loadingSpinner.innerHTML = `
                    <div class="text-red-500">
                        <i data-lucide="alert-circle" class="w-10 h-10 mx-auto mb-3"></i>
                        <p>讀取資料失敗。</p>
                        <p class="text-sm mt-2">請確認 Google Sheet 是否已設定為「知道連結的人均可查看」。</p>
                    </div>
                `;
                lucide.createIcons();
            }
        }

        function processData(headers, rows) {
            if (rows.length === 0) {
                loadingSpinner.innerHTML = '<p class="text-gray-500">沒有找到資料紀錄。</p>';
                return;
            }
            
            // 根據需求，將分類強制指定為 E 欄 (索引 4，因為 A=0, B=1, C=2, D=3, E=4)
            let catIdx = 4; 
            let titleIdx = 1; 
            let contentIdx = 2; 

            headers.forEach((h, i) => {
                const headerStr = String(h).toLowerCase();
                // 移除分類的自動偵測，固定抓取 E 欄。保留標題與內容的自動偵測。
                if (headerStr.includes('標題') || headerStr.includes('名稱') || headerStr.includes('主題') || headerStr.includes('title')) titleIdx = i;
                if (headerStr.includes('內容') || headerStr.includes('提示詞') || headerStr.includes('指令') || headerStr.includes('prompt')) contentIdx = i;
            });

            // 解析並整理資料
            allData = rows.map(row => ({
                    // 強制讀取 E 欄 (catIdx = 4)
                    category: (row[catIdx] && String(row[catIdx]).trim() !== '') ? String(row[catIdx]).trim() : '未分類',
                    title: (row[titleIdx] && String(row[titleIdx]).trim() !== '') ? String(row[titleIdx]).trim() : '無標題',
                    content: (row[contentIdx] && String(row[contentIdx]).trim() !== '') ? String(row[contentIdx]).trim() : ''
                }))
                // 過濾掉標題與內容皆為空的行
                .filter(item => item.title !== '無標題' || item.content !== '');

            // 移除載入狀態，顯示內容
            loadingSpinner.classList.add('hidden');
            cardsContainer.classList.remove('hidden');

            renderTags();
            renderCards();
        }

        // 渲染分類標籤
        function renderTags() {
            const uniqueTags = ['全部', ...new Set(allData.map(item => item.category).filter(Boolean))];
            
            categoriesContainer.innerHTML = uniqueTags.map(tag => {
                const isActive = activeCategory === tag;
                const baseClasses = "rounded-full px-5 py-1.5 text-sm font-medium transition-all duration-200 border cursor-pointer whitespace-nowrap";
                const activeClasses = isActive 
                    ? "bg-[#FFB7B2] text-white border-[#FFB7B2] shadow-sm" 
                    : "bg-white text-gray-500 border-[#fae6e3] hover:bg-[#fff5f2] hover:border-[#FFB7B2]";
                
                return `<button onclick="setCategory('${tag}')" class="${baseClasses} ${activeClasses}">${tag}</button>`;
            }).join('');
        }

        // 切換分類
        window.setCategory = function(category) {
            activeCategory = category;
            renderTags();
            renderCards();
        };

        // 搜尋監聽
        searchInput.addEventListener('input', (e) => {
            searchTerm = e.target.value;
            renderCards();
        });

        // 渲染卡片
        function renderCards() {
            const filteredData = allData.filter(item => {
                const matchCategory = activeCategory === '全部' || item.category === activeCategory;
                const searchLower = searchTerm.toLowerCase();
                const matchSearch = item.title.toLowerCase().includes(searchLower) || 
                                    item.content.toLowerCase().includes(searchLower);
                return matchCategory && matchSearch;
            });

            if (filteredData.length === 0) {
                cardsContainer.innerHTML = `
                    <div class="col-span-full text-center py-20 text-gray-400">
                        <i data-lucide="search-x" class="w-12 h-12 mx-auto mb-3 text-rose-200"></i>
                        <p>找不到符合的提示詞</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            // 馬卡龍色系設定 (邊框, 背景, 文字, 按鈕)
            const macaronThemes = [
                { border: 'border-[#FFB7B2]', bg: 'bg-[#FFB7B2]/20', text: 'text-[#d97c75]', btn: 'bg-[#FFB7B2] hover:bg-[#f0a6a1]' }, // 櫻花粉
                { border: 'border-[#B5EAD7]', bg: 'bg-[#B5EAD7]/40', text: 'text-[#5ca88d]', btn: 'bg-[#B5EAD7] hover:bg-[#a1d6c3]' }, // 薄荷綠
                { border: 'border-[#C7CEEA]', bg: 'bg-[#C7CEEA]/50', text: 'text-[#7a85b5]', btn: 'bg-[#C7CEEA] hover:bg-[#b5bce0]' }, // 寶寶藍
                { border: 'border-[#FFDAC1]', bg: 'bg-[#FFDAC1]/50', text: 'text-[#d49973]', btn: 'bg-[#FFDAC1] hover:bg-[#f0cbb0]' }, // 蜜桃橘
                { border: 'border-[#F1CBFF]', bg: 'bg-[#F1CBFF]/40', text: 'text-[#b87bd1]', btn: 'bg-[#F1CBFF] hover:bg-[#e3bdf2]' }  // 香芋紫
            ];

            cardsContainer.innerHTML = filteredData.map((item, index) => {
                const theme = macaronThemes[index % macaronThemes.length];
                
                return `
                <div class="bg-white rounded-3xl shadow-sm hover:shadow-md transition-shadow duration-300 border-t-[6px] ${theme.border} p-6 flex flex-col h-[420px]">
                    <!-- 分類標籤 (加入 shrink-0 避免被壓縮) -->
                    <div class="mb-3 shrink-0">
                        <span class="${theme.bg} ${theme.text} text-xs px-3 py-1.5 rounded-full font-bold tracking-wide">
                            ${escapeHTML(item.category)}
                        </span>
                    </div>
                    
                    <!-- 標題 (加入 shrink-0 避免高度被壓縮，並設定 line-clamp-2) -->
                    <h3 class="text-lg font-bold text-gray-700 mb-4 line-clamp-2 shrink-0 leading-snug" title="${escapeHTML(item.title)}">
                        ${escapeHTML(item.title)}
                    </h3>
                    
                    <!-- 內容區塊 (可捲動) -->
                    <div class="bg-[#fcfbf9] rounded-2xl p-4 text-sm text-gray-600 flex-grow overflow-y-auto mb-5 whitespace-pre-wrap border border-[#f0ece6] custom-scrollbar leading-relaxed">
${escapeHTML(item.content)}
                    </div>
                    
                    <!-- 按鈕 (加入 shrink-0 避免被壓縮) -->
                    <button onclick="copyPrompt(this, \`${encodeURIComponent(item.content)}\`, '${theme.btn}')" 
                            class="w-full ${theme.btn} text-gray-700 font-bold py-3 rounded-2xl transition-colors flex items-center justify-center gap-2 group shrink-0">
                        <i data-lucide="copy" class="w-4 h-4 group-hover:scale-110 transition-transform"></i>
                        <span class="btn-text">複製 Prompt</span>
                    </button>
                </div>
            `}).join('');

            lucide.createIcons();
        }

        // 複製提示詞邏輯
        window.copyPrompt = async function(btnEl, encodedText, originalBtnClass) {
            const text = decodeURIComponent(encodedText);
            const iconEl = btnEl.querySelector('i');
            const textEl = btnEl.querySelector('.btn-text');
            
            // 解析原本的主題 CSS class
            const originalClasses = originalBtnClass.split(' ');

            try {
                await navigator.clipboard.writeText(text);
                
                // 變更為成功狀態 (馬卡龍開心果綠)
                btnEl.classList.remove(...originalClasses);
                btnEl.classList.add('bg-[#d4edda]', 'text-[#155724]');
                iconEl.setAttribute('data-lucide', 'check');
                textEl.textContent = '已複製！';
                lucide.createIcons();

                // 2 秒後恢復原狀
                setTimeout(() => {
                    btnEl.classList.remove('bg-[#d4edda]', 'text-[#155724]');
                    btnEl.classList.add(...originalClasses);
                    iconEl.setAttribute('data-lucide', 'copy');
                    textEl.textContent = '複製 Prompt';
                    lucide.createIcons();
                }, 2000);

            } catch (err) {
                // 若剪貼簿 API 失敗的降級處理
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    alert('已複製到剪貼簿！');
                } catch (ex) {
                    alert('複製失敗，請手動選取複製。');
                }
                document.body.removeChild(textArea);
            }
        };

        // 安全處理文字顯示
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }
    </script>
</body>
</html>
