<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt 智能寶庫</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- 字體：圓潤可愛標題 + 清爽內文 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root{
            --paper: #FBF8F3;
            --paper-2: #ffffff;
            --sumi: #3d3936;
            --stone: #a39a8e;
            --line: #efe9e0;
            --sakura: #F3B9C3; --sakura-d: #d97e8f;
            --matcha: #A9C99A; --matcha-d: #5f8a55;
            --sora:   #A9CBE0; --sora-d:   #4f7fa3;
            --yuzu:   #F2D18B; --yuzu-d:   #b9862c;
            --fuji:   #CBB6E0; --fuji-d:   #7f5ea3;
        }
        * { box-sizing: border-box; }
        body {
            background: var(--paper);
            font-family: 'Noto Sans TC', sans-serif;
            color: var(--sumi);
        }
        .font-display { font-family: 'Zen Maru Gothic', 'Noto Sans TC', sans-serif; }

        /* 漂浮花瓣裝飾（極輕、剋制） */
        .petal-field { position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
        .petal {
            position: absolute; opacity: 0.5;
            animation: drift 14s ease-in-out infinite;
        }
        .petal.p2 { animation-duration: 18s; animation-delay: -4s; }
        .petal.p3 { animation-duration: 22s; animation-delay: -9s; }
        @keyframes drift {
            0%   { transform: translate(0, 0) rotate(0deg); }
            50%  { transform: translate(8px, 14px) rotate(20deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .badge {
            width: 60px; height: 60px; border-radius: 999px;
            background: linear-gradient(145deg, #ffffff, #fdeef1);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 18px rgba(211,140,155,0.25), inset 0 0 0 1px rgba(211,140,155,0.25);
        }

        #searchInput {
            background: var(--paper-2);
            border: 1.5px solid var(--line);
            color: var(--sumi);
        }
        #searchInput::placeholder { color: var(--stone); }
        #searchInput:focus { box-shadow: 0 0 0 4px rgba(243,185,195,0.25); border-color: var(--sakura); }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #e7ded1; border-radius: 20px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #d8cbb6; }

        .vault-link {
            border: 1.5px solid var(--line);
            background: var(--paper-2);
            color: var(--sumi);
        }
        .vault-link:hover { background: #fdf4ee; border-color: var(--sakura); }

        .cat-pill {
            border: 1.5px solid var(--line);
            background: var(--paper-2);
            color: var(--stone);
        }
        .cat-pill.active {
            background: var(--sakura);
            color: #5a2430;
            border-color: var(--sakura-d);
        }
        .cat-pill:not(.active):hover { border-color: var(--sakura); color: var(--sakura-d); }

        .prompt-card {
            background: var(--paper-2);
            border: 1.5px solid var(--line);
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
        }
        .prompt-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 32px rgba(61,57,54,0.08);
        }
        .content-inset {
            background: #FAF6EF;
            border: 1px solid var(--line);
        }
        .icon-chip {
            width: 30px; height: 30px; border-radius: 999px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
    </style>
</head>
<body class="min-h-screen pb-16">

    <!-- 頂部區塊 -->
    <header class="relative pt-14 pb-9 px-4 text-center overflow-hidden">
        <div class="petal-field">
            <svg class="petal p1" style="top:12%; left:8%;" width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2c2 3-1 5-1 5s3 2 1 5c-2-3 1-5 1-5s-3-2-1-5z" fill="#F3B9C3"/></svg>
            <svg class="petal p2" style="top:20%; right:12%;" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 2c2 3-1 5-1 5s3 2 1 5c-2-3 1-5 1-5s-3-2-1-5z" fill="#CBB6E0"/></svg>
            <svg class="petal p3" style="top:55%; left:20%;" width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 2c2 3-1 5-1 5s3 2 1 5c-2-3 1-5 1-5s-3-2-1-5z" fill="#A9C99A"/></svg>
        </div>

        <div class="relative flex flex-col items-center gap-4 mb-2">
            <div class="badge">
                <i data-lucide="flower-2" class="w-7 h-7 text-[color:var(--sakura-d)]"></i>
            </div>
            <h1 class="font-display text-3xl md:text-4xl font-bold text-[color:var(--sumi)] tracking-wide">
                AI Prompt 智能寶庫
            </h1>
        </div>
        <p class="text-[color:var(--stone)] text-sm mb-6">整理你最常用的提示詞，隨手可得</p>

        <a href="https://docs.google.com/spreadsheets/d/1GNAyE5fNZ4pU8MDxxADHvwWVKqEpxPGZ1iqyeMHKn2U/edit?gid=2013526827#gid=2013526827"
           target="_blank" rel="noopener noreferrer"
           class="vault-link relative inline-flex items-center gap-2 px-4 py-1.5 rounded-full text-sm transition-colors mb-9">
            <i data-lucide="folder-open" class="w-4 h-4"></i>
            開啟原始資料 Google Sheet
        </a>

        <!-- 搜尋列 -->
        <div class="max-w-2xl mx-auto relative mb-8 px-4">
            <div class="absolute inset-y-0 left-8 flex items-center pointer-events-none text-[color:var(--sakura-d)]">
                <i data-lucide="search" class="w-5 h-5"></i>
            </div>
            <input type="text" id="searchInput" placeholder="搜尋提示詞..."
                   class="w-full pl-12 pr-6 py-3.5 rounded-full focus:outline-none transition-all text-base">
        </div>

        <!-- 分類標籤 -->
        <div class="max-w-5xl mx-auto px-4 overflow-x-auto hide-scrollbar">
            <div id="categories" class="flex flex-wrap justify-center gap-2.5 min-w-max md:min-w-0">
                <!-- 標籤會由 JavaScript 動態生成 -->
            </div>
        </div>
    </header>

    <!-- 內容區塊 -->
    <main class="max-w-7xl mx-auto px-4 md:px-6 lg:px-8">
        <div class="flex items-center gap-2 mb-7 ml-2">
            <i data-lucide="sparkles" class="w-5 h-5 text-[color:var(--yuzu-d)]"></i>
            <h2 class="font-display text-xl font-bold text-[color:var(--sumi)]">AI 協思</h2>
        </div>

        <!-- 載入中提示 -->
        <div id="loading" class="text-center py-20">
            <i data-lucide="loader-2" class="w-10 h-10 animate-spin text-[color:var(--sakura-d)] mx-auto mb-4"></i>
            <p class="text-[color:var(--stone)] font-medium">正在從 Google Sheet 讀取資料中...</p>
        </div>

        <!-- 提示詞卡片網格 -->
        <div id="cards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 hidden">
            <!-- 卡片會由 JavaScript 動態生成 -->
        </div>
    </main>

    <script>
        // 初始化 Lucide Icons
        lucide.createIcons();

        // 狀態管理
        let allData = [];
        let activeCategory = '全部';
        let searchTerm = '';

        // DOM 元素
        const categoriesContainer = document.getElementById('categories');
        const cardsContainer = document.getElementById('cards');
        const searchInput = document.getElementById('searchInput');
        const loadingSpinner = document.getElementById('loading');

        // Google Sheet 網址處理 (使用 Google Visualization API，原生支援 CORS)
        const sheetId = '1GNAyE5fNZ4pU8MDxxADHvwWVKqEpxPGZ1iqyeMHKn2U';
        const gid = '2013526827';
        const jsonUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}`;

        // 初始化：獲取資料
        fetchData();

        async function fetchData() {
            try {
                const response = await fetch(jsonUrl);
                if (!response.ok) throw new Error('Network error');

                const text = await response.text();

                // 擷取 JSON 物件
                const jsonString = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                const data = JSON.parse(jsonString);

                // 解析標題 (cols) 與資料列 (rows)
                let headers = data.table.cols.map(col => col.label || '');
                let rows = data.table.rows.map(row => {
                    if (!row || !row.c) return [];
                    return row.c.map(cell => {
                        if (!cell) return '';
                        return (cell.f !== undefined && cell.f !== null) ? String(cell.f) :
                               (cell.v !== undefined && cell.v !== null) ? String(cell.v) : '';
                    });
                });

                // 智慧判斷: 如果 API 沒抓到標題，手動從第一列抓取
                if (headers.every(h => h === '') && rows.length > 0) {
                    const firstRowStr = rows[0].join('').toLowerCase();
                    const keywords = ['分類', '類別', '標題', '名稱', '主題', '內容', '提示詞', '指令', 'category', 'title', 'prompt'];
                    const seemsLikeHeader = keywords.some(kw => firstRowStr.includes(kw));

                    if (seemsLikeHeader) {
                        headers = rows.shift(); // 抽出第一列作為標題
                    }
                }

                processData(headers, rows);

            } catch (err) {
                console.error("載入資料失敗:", err);
                loadingSpinner.innerHTML = `
                    <div class="text-[color:var(--sakura-d)]">
                        <i data-lucide="alert-circle" class="w-10 h-10 mx-auto mb-3"></i>
                        <p>讀取資料失敗。</p>
                        <p class="text-sm mt-2 text-[color:var(--stone)]">請確認 Google Sheet 是否已設定為「知道連結的人均可查看」。</p>
                    </div>
                `;
                lucide.createIcons();
            }
        }

        function processData(headers, rows) {
            if (rows.length === 0) {
                loadingSpinner.innerHTML = '<p class="text-[color:var(--stone)]">沒有找到資料紀錄。</p>';
                return;
            }

            // 根據需求，將分類強制指定為 E 欄 (索引 4，因為 A=0, B=1, C=2, D=3, E=4)
            let catIdx = 4;
            let titleIdx = 1;
            let contentIdx = 2;

            headers.forEach((h, i) => {
                const headerStr = String(h).toLowerCase();
                // 移除分類的自動偵測，固定抓取 E 欄。保留標題與內容的自動偵測。
                if (headerStr.includes('標題') || headerStr.includes('名稱') || headerStr.includes('主題') || headerStr.includes('title')) titleIdx = i;
                if (headerStr.includes('內容') || headerStr.includes('提示詞') || headerStr.includes('指令') || headerStr.includes('prompt')) contentIdx = i;
            });

            // 解析並整理資料
            allData = rows.map(row => ({
                    // 強制讀取 E 欄 (catIdx = 4)
                    category: (row[catIdx] && String(row[catIdx]).trim() !== '') ? String(row[catIdx]).trim() : '未分類',
                    title: (row[titleIdx] && String(row[titleIdx]).trim() !== '') ? String(row[titleIdx]).trim() : '無標題',
                    content: (row[contentIdx] && String(row[contentIdx]).trim() !== '') ? String(row[contentIdx]).trim() : ''
                }))
                // 過濾掉標題與內容皆為空的行
                .filter(item => item.title !== '無標題' || item.content !== '');

            // 移除載入狀態，顯示內容
            loadingSpinner.classList.add('hidden');
            cardsContainer.classList.remove('hidden');

            renderTags();
            renderCards();
        }

        // 渲染分類標籤
        function renderTags() {
            const uniqueTags = ['全部', ...new Set(allData.map(item => item.category).filter(Boolean))];

            categoriesContainer.innerHTML = uniqueTags.map(tag => {
                const isActive = activeCategory === tag;
                const baseClasses = "cat-pill rounded-full px-5 py-1.5 text-sm font-medium transition-all duration-200 cursor-pointer whitespace-nowrap";
                const activeClass = isActive ? "active" : "";

                return `<button onclick="setCategory('${tag}')" class="${baseClasses} ${activeClass}">${tag}</button>`;
            }).join('');
        }

        // 切換分類
        window.setCategory = function(category) {
            activeCategory = category;
            renderTags();
            renderCards();
        };

        // 搜尋監聽
        searchInput.addEventListener('input', (e) => {
            searchTerm = e.target.value;
            renderCards();
        });

        // 渲染卡片
        function renderCards() {
            const filteredData = allData.filter(item => {
                const matchCategory = activeCategory === '全部' || item.category === activeCategory;
                const searchLower = searchTerm.toLowerCase();
                const matchSearch = item.title.toLowerCase().includes(searchLower) ||
                                    item.content.toLowerCase().includes(searchLower);
                return matchCategory && matchSearch;
            });

            if (filteredData.length === 0) {
                cardsContainer.innerHTML = `
                    <div class="col-span-full text-center py-20 text-[color:var(--stone)]">
                        <i data-lucide="search-x" class="w-12 h-12 mx-auto mb-3 text-[color:var(--sakura)]"></i>
                        <p>找不到符合的提示詞</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            // 和風配色 + 可愛小圖示設定
            const japanThemes = [
                { chipBg: 'bg-[#F3B9C3]/30', text: 'text-[#b8586c]', border: 'border-[#F3B9C3]', iconBg: 'bg-[#F3B9C3]/40', icon: 'flower-2', btn: 'bg-[#F3B9C3] hover:bg-[#eda6b2]' },
                { chipBg: 'bg-[#A9C99A]/30', text: 'text-[#4f7a45]', border: 'border-[#A9C99A]', iconBg: 'bg-[#A9C99A]/40', icon: 'leaf', btn: 'bg-[#A9C99A] hover:bg-[#96bc85]' },
                { chipBg: 'bg-[#A9CBE0]/30', text: 'text-[#3f6f92]', border: 'border-[#A9CBE0]', iconBg: 'bg-[#A9CBE0]/40', icon: 'cloud', btn: 'bg-[#A9CBE0] hover:bg-[#93bcd6]' },
                { chipBg: 'bg-[#F2D18B]/35', text: 'text-[#a9782a]', border: 'border-[#F2D18B]', iconBg: 'bg-[#F2D18B]/45', icon: 'sun', btn: 'bg-[#F2D18B] hover:bg-[#eec372]' },
                { chipBg: 'bg-[#CBB6E0]/30', text: 'text-[#6d4d92]', border: 'border-[#CBB6E0]', iconBg: 'bg-[#CBB6E0]/40', icon: 'sparkles', btn: 'bg-[#CBB6E0] hover:bg-[#bda2d6]' }
            ];

            cardsContainer.innerHTML = filteredData.map((item, index) => {
                const theme = japanThemes[index % japanThemes.length];

                return `
                <div class="prompt-card rounded-3xl p-6 flex flex-col h-[420px] border-t-[4px] ${theme.border}">
                    <!-- 分類標籤 + 可愛小圖示 (加入 shrink-0 避免被壓縮) -->
                    <div class="mb-3 shrink-0 flex items-center gap-2">
                        <span class="icon-chip ${theme.iconBg}">
                            <i data-lucide="${theme.icon}" class="w-4 h-4 ${theme.text}"></i>
                        </span>
                        <span class="${theme.chipBg} ${theme.text} text-xs px-3 py-1.5 rounded-full font-bold tracking-wide">
                            ${escapeHTML(item.category)}
                        </span>
                    </div>

                    <!-- 標題 (加入 shrink-0 避免高度被壓縮，並設定 line-clamp-2) -->
                    <h3 class="font-display text-lg font-bold text-[color:var(--sumi)] mb-4 line-clamp-2 shrink-0 leading-snug" title="${escapeHTML(item.title)}">
                        ${escapeHTML(item.title)}
                    </h3>

                    <!-- 內容區塊 (可捲動) -->
                    <div class="content-inset rounded-2xl p-4 text-sm text-[color:var(--sumi)]/80 flex-grow overflow-y-auto mb-5 whitespace-pre-wrap custom-scrollbar leading-relaxed">
${escapeHTML(item.content)}
                    </div>

                    <!-- 按鈕 (加入 shrink-0 避免被壓縮) -->
                    <button onclick="copyPrompt(this, \`${encodeURIComponent(item.content)}\`, '${theme.btn}')"
                            class="w-full ${theme.btn} text-[#3d3936] font-bold py-3 rounded-2xl transition-colors flex items-center justify-center gap-2 group shrink-0">
                        <i data-lucide="copy" class="w-4 h-4 group-hover:scale-110 transition-transform"></i>
                        <span class="btn-text">複製 Prompt</span>
                    </button>
                </div>
            `}).join('');

            lucide.createIcons();
        }

        // 複製提示詞邏輯
        window.copyPrompt = async function(btnEl, encodedText, originalBtnClass) {
            const text = decodeURIComponent(encodedText);
            const iconEl = btnEl.querySelector('i');
            const textEl = btnEl.querySelector('.btn-text');

            // 解析原本的主題 CSS class
            const originalClasses = originalBtnClass.split(' ');

            try {
                await navigator.clipboard.writeText(text);

                // 變更為成功狀態 (抹茶綠)
                btnEl.classList.remove(...originalClasses);
                btnEl.classList.add('bg-[#A9C99A]', 'text-[#33461f]');
                iconEl.setAttribute('data-lucide', 'check');
                textEl.textContent = '已複製！';
                lucide.createIcons();

                // 2 秒後恢復原狀
                setTimeout(() => {
                    btnEl.classList.remove('bg-[#A9C99A]', 'text-[#33461f]');
                    btnEl.classList.add(...originalClasses);
                    iconEl.setAttribute('data-lucide', 'copy');
                    textEl.textContent = '複製 Prompt';
                    lucide.createIcons();
                }, 2000);

            } catch (err) {
                // 若剪貼簿 API 失敗的降級處理
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    alert('已複製到剪貼簿！');
                } catch (ex) {
                    alert('複製失敗，請手動選取複製。');
                }
                document.body.removeChild(textArea);
            }
        };

        // 安全處理文字顯示
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g,
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }
    </script>
</body>
</html>
